<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>比賽計時</title>

<style>
  body { font-family: Arial, sans-serif; margin:10px; font-size:18px; }
  .row { display:flex; gap:8px; margin-bottom:12px; align-items:center; }
  .row-wrap { flex-wrap:wrap; }
  input, select, button { font-size:18px; padding:8px; border-radius:6px; box-sizing:border-box; }
  button { border:none; cursor:pointer; color:#fff; }
  button:disabled { cursor:not-allowed; opacity:0.55; }

  .btn-blue  { background:#cce5ff; color:#000; }
  .btn-started { background:#ffe08a; color:#000; }
  .btn-finished { background:#b7e4c7; color:#000; }
  .btn-red   { background:#ff99e6; color:#000; }
  .btn-green { background:#28a745; }
  .btn-orange{ background:#fd7e14; }
  .btn-gray  { background:#bfbfbf; color:#000; }

  #today { width:6.5em; }
  #place { width:7em; }
  #distance { width:6em; }
  #type { width:6em; }

  table { width:100%; border-collapse:collapse; margin-top:12px; }
  th, td { border:1px solid #ccc; padding:0; }
  th { background:#f0f0f0; padding:6px; text-align:left; }

  .player-row { background:#eef6ff; }
  .sub-row { background:#fff; }
  .sub-row td { padding:3px; font-size:15px; }

  .player-row td { padding:0; }
  .player-row button { margin:0; padding:4px; width:100%; min-height:38px; font-weight:normal; }

  .player-num {
    width:100%;
    text-align:center;
    font-weight:bold;
    font-size:17px;
    padding:10px 4px;
    line-height:1.2;
    user-select:none;
    background:#ffffff;
    box-sizing:border-box;
  }

  td.col-num {
    width:18%;
    min-width:80px;
    max-width:100px;
    padding:0;
    background:#ffffff;
    box-sizing:border-box;
  }

  td.col-name { width:34%; }
  td.col-score { width:28%; }
  td.col-finish { width:20%; }

  .time-big {
    font-size:20px;
    text-align:center;
    padding:4px;
    white-space:nowrap;
  }

  .info-box {
    min-height:30px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:2px 6px;
    gap:10px;
  }

  tr.dragging { opacity:0.4; }

  .row-tools{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:4px;
    box-sizing:border-box;
  }

  .drag-handle {
    font-size:18px;
    line-height:1;
    cursor:grab;
    user-select:none;
    touch-action:none;
    margin-right:6px;
  }
  .drag-handle:active { cursor:grabbing; }

  .btn-del, .btn-undo-row{
    width:auto;
    padding:3px 8px;
    font-size:12px;
  }

  .tool-group {
    display:flex;
    gap:8px;
    align-items:center;
    flex-wrap:wrap;
  }

  #log th,
  #log td {
    text-align:center;
    padding:5px 3px;
  }

  #log th:last-child,
  #log td:last-child {
    white-space:nowrap;
    font-size:14px;
  }

  #log tr.latest-log td { background:#fff4b8; }
  #log td.uploaded-num { background:#b7e4c7; }
  #log tr.latest-log td.uploaded-num { background:#8fd19e; }
  #log td.upload-failed-num { background:#ffb3b3; }
  #log tr.latest-log td.upload-failed-num { background:#ff8f8f; }
  #status { font-size:14px; color:#444; min-height:20px; }
  #uploadBtn { margin-left:auto; }
  .group-filter-row th { padding:6px; background:#f7f7f7; }
  .group-filter-options { display:flex; flex-wrap:wrap; gap:10px; align-items:center; justify-content:flex-start; font-size:16px; }
  .group-filter-options label { display:flex; align-items:center; gap:4px; white-space:nowrap; }
  .group-filter-options input[type="checkbox"] { width:16px; height:16px; padding:0; }
  .legend { display:flex; gap:12px; align-items:center; font-size:14px; color:#444; margin:2px 0 8px; }
  .legend-swatch { display:inline-block; width:18px; height:12px; border:1px solid #999; vertical-align:middle; margin-right:4px; }
  .legend-uploaded { background:#b7e4c7; }
  .legend-failed { background:#ffb3b3; }
</style>
</head>

<body>

<div id="scoreArea">
  <div class="row row-wrap" id="raceHeader">
    <input id="today" disabled />
    <input id="place" placeholder="地點" value="大都會公園" />
    <input id="distance" placeholder="距離" />
    <select id="type">
      <option>自由式</option>
      <option>傳統式</option>
    </select>
  </div>

  <table id="players">
    <thead>
      <tr class="group-filter-row">
        <th colspan="4">
          <div class="group-filter-options">
            <label><input type="checkbox" class="player-group-filter" value="U10" checked>U10</label>
            <label><input type="checkbox" class="player-group-filter" value="U12" checked>U12</label>
            <label><input type="checkbox" class="player-group-filter" value="U14" checked>U14</label>
            <label><input type="checkbox" class="player-group-filter" value="U16" checked>U16</label>
            <label><input type="checkbox" class="player-group-filter" value="OPEN" checked>OPEN</label>
          </div>
        </th>
      </tr>
    </thead>
    <tbody id="playersBody"></tbody>
  </table>
</div>

<div class="row row-wrap" style="justify-content:space-between; margin-top:16px;">
  <div class="tool-group">
    <button class="btn-red" id="resetBtn">重置</button>
    <button class="btn-green" id="addPlayerBtn">新增選手</button>
    <button class="btn-gray" id="undoBtn">Undo</button>
  </div>
  <button class="btn-orange" id="captureScores">成績截圖</button>
</div>

<div class="row row-wrap" style="margin-top:16px; margin-bottom:4px;">
  <h3 style="margin:0;">歷程記錄</h3>
  <button class="btn-green" id="sortLogBtn">記錄排序</button>
  <button class="btn-orange" id="captureLogBtn">記錄截圖</button>
  <button class="btn-green" id="uploadBtn">上傳記錄</button>
</div>
<div id="status"></div>
<table id="log"></table>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbx2vTGvJXVLdapYetS6xUgwvDXXXjiky-jdjUTwMMealEZEwIHIu9reLlizIzOqbbwl/exec";
const STORAGE_KEY = "rollerski_laps_state_v2";
const PLAYER_GROUPS = ["U10", "U12", "U14", "U16", "OPEN"];

const defaultPlayers = [
  { group:"U10", num:"121", name:"藍121" },
  { group:"U10", num:"122", name:"藍122" },
  { group:"U10", num:"123", name:"藍123" },
  { group:"U10", num:"124", name:"藍124" },
  { group:"U10", num:"125", name:"藍125" },
  { group:"U10", num:"126", name:"藍126" },
  { group:"U10", num:"127", name:"藍127" },
  { group:"U10", num:"128", name:"藍128" },
  { group:"U10", num:"129", name:"藍129" },
  { group:"U12", num:"341", name:"粉341" },
  { group:"U12", num:"342", name:"粉342" },
  { group:"U12", num:"343", name:"粉343" },
  { group:"U12", num:"344", name:"粉344" },
  { group:"U12", num:"345", name:"粉345" },
  { group:"U12", num:"346", name:"粉346" },
  { group:"U12", num:"347", name:"粉347" },
  { group:"U12", num:"348", name:"粉348" },
  { group:"U14", num:"349", name:"粉349" },
  { group:"U14", num:"350", name:"粉350" },
  { group:"U14", num:"351", name:"粉351" },
  { group:"U14", num:"352", name:"粉352" },
  { group:"U14", num:"353", name:"粉353" },
  { group:"U14", num:"354", name:"粉354" },
  { group:"U14", num:"355", name:"粉355" },
  { group:"U14", num:"356", name:"粉356" },
  { group:"U14", num:"357", name:"粉357" },
  { group:"U16", num:"561", name:"菊561" },
  { group:"U16", num:"562", name:"菊562" },
  { group:"U16", num:"563", name:"菊563" },
  { group:"U16", num:"564", name:"菊564" },
  { group:"U16", num:"565", name:"菊565" },
  { group:"U16", num:"566", name:"菊566" },
  { group:"U16", num:"567", name:"菊567" },
  { group:"U16", num:"568", name:"菊568" },
  { group:"U16", num:"569", name:"菊569" },
  { group:"U16", num:"570", name:"菊570" },
  { group:"U16", num:"571", name:"菊571" },
  { group:"OPEN", num:"572", name:"菊572" },
  { group:"OPEN", num:"573", name:"菊573" },
  { group:"OPEN", num:"574", name:"菊574" },
  { group:"OPEN", num:"575", name:"菊575" },
  { group:"OPEN", num:"576", name:"菊576" },
  { group:"OPEN", num:"577", name:"菊577" },
  { group:"OPEN", num:"578", name:"菊578" },
  { group:"OPEN", num:"579", name:"菊579" },
  { group:"OPEN", num:"580", name:"菊580" },
  { group:"OPEN", num:"358", name:"粉358" },
  { group:"OPEN", num:"359", name:"粉359" },
  { group:"OPEN", num:"360", name:"粉360" }
];

let players = [];
let logs = [];
let nextPlayerId = 1;
let nextLogId = 1;
let latestLogId = null;
let tickTimer = null;
let draggingId = null;
let logSortMode = "time";
let isUploading = false;
const ZERO_TIME = "00:00:000";

function newPlayer(num, name, group = ""){
  return {
    id: nextPlayerId++,
    group: String(group || "").trim(),
    num: String(num).trim(),
    name: String(name).trim(),
    start: null,
    elapsed: 0,
    laps: [],
    running: false,
    finished: false
  };
}

function getActivePlayerGroups(){
  return new Set(
    Array.from(document.querySelectorAll(".player-group-filter"))
      .filter(checkbox => checkbox.checked)
      .map(checkbox => checkbox.value)
  );
}

function isPlayerGroupVisible(player){
  const group = player.group || "";
  return !group || getActivePlayerGroups().has(group);
}

function updatePlayerGroupVisibility(){
  renderPlayers();
}

function localDateInputValue(date = new Date()){
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

function localDateSlash(){
  const raw = document.getElementById("today").value || localDateInputValue();
  const parts = raw.split("-");
  if (parts.length === 3) return `${Number(parts[0])}/${Number(parts[1])}/${Number(parts[2])}`;
  return raw;
}

function localDateTimeValue(date = new Date()){
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  const hh = String(date.getHours()).padStart(2, "0");
  const mm = String(date.getMinutes()).padStart(2, "0");
  const ss = String(date.getSeconds()).padStart(2, "0");
  return `${y}/${m}/${d} ${hh}:${mm}:${ss}`;
}

function fmt(ms){
  const safe = Math.max(0, Math.floor(ms || 0));
  const m = Math.floor(safe / 60000);
  const s = Math.floor((safe % 60000) / 1000);
  const ms3 = safe % 1000;
  return String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0") + ":" + String(ms3).padStart(3,"0");
}

function escapeHtml(value){
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function getPlayer(id){
  return players.find(p => p.id === id);
}

function comparePlayerNumber(a, b){
  const na = parseInt(a.num, 10);
  const nb = parseInt(b.num, 10);
  if (!Number.isNaN(na) && !Number.isNaN(nb) && na !== nb) return na - nb;
  return String(a.num).localeCompare(String(b.num), "zh-Hant", { numeric: true });
}

function currentElapsed(p){
  if (!p) return 0;
  if (p.running && p.start) return Date.now() - p.start;
  return p.elapsed || 0;
}

function lastLapMs(p){
  if (!p || !p.laps.length) return 0;
  const last = p.laps[p.laps.length - 1];
  const prev = p.laps.length > 1 ? p.laps[p.laps.length - 2] : 0;
  return last - prev;
}

function avgLapMs(p){
  if (!p || !p.laps.length) return 0;
  return Math.floor(p.laps[p.laps.length - 1] / p.laps.length);
}

function setStatus(message){
  document.getElementById("status").textContent = message || "";
}

function saveState(){
  const state = {
    meta: {
      today: document.getElementById("today").value,
      place: document.getElementById("place").value,
      distance: document.getElementById("distance").value,
      type: document.getElementById("type").value
    },
    players,
    logs,
    nextPlayerId,
    nextLogId,
    latestLogId,
    logSortMode
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function loadState(){
  const todayEl = document.getElementById("today");
  todayEl.value = localDateInputValue();

  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) throw new Error("no saved state");
    const state = JSON.parse(raw);
    if (!Array.isArray(state.players)) throw new Error("bad saved state");

    players = state.players.map(p => ({
      id: Number(p.id),
      group: String(p.group || ""),
      num: String(p.num || ""),
      name: String(p.name || ""),
      start: p.running && p.start ? Number(p.start) : null,
      elapsed: Number(p.elapsed || 0),
      laps: Array.isArray(p.laps) ? p.laps.map(Number).filter(n => !Number.isNaN(n)) : [],
      running: Boolean(p.running),
      finished: Boolean(p.finished)
    }));
    logs = Array.isArray(state.logs) ? state.logs.map(r => ({
      ...r,
      recordDateTime: r.recordDateTime || ""
    })) : [];
    nextPlayerId = Number(state.nextPlayerId || 0);
    nextLogId = Number(state.nextLogId || 0);
    latestLogId = state.latestLogId === undefined ? null : Number(state.latestLogId);
    logSortMode = state.logSortMode || "time";

    if (!nextPlayerId) nextPlayerId = Math.max(0, ...players.map(p => p.id || 0)) + 1;
    if (!nextLogId) nextLogId = Math.max(0, ...logs.map(r => r.id || 0)) + 1;
    if (!latestLogId && logs.length) latestLogId = logs[logs.length - 1].id;

    defaultPlayers.forEach(defaultPlayer => {
      const existing = players.find(p => p.num === defaultPlayer.num);
      if (existing) {
        existing.group = defaultPlayer.group;
        existing.name = defaultPlayer.name;
      } else {
        players.push(newPlayer(defaultPlayer.num, defaultPlayer.name, defaultPlayer.group));
      }
    });
    const defaultNums = new Set(defaultPlayers.map(p => p.num));
    const activePlayerIds = new Set();
    players = players.filter(p => {
      const keep = defaultNums.has(p.num);
      if (keep) activePlayerIds.add(p.id);
      return keep;
    });
    logs = logs.filter(r => activePlayerIds.has(Number(r.playerId)));
    if (!logs.some(r => r.id === latestLogId)) latestLogId = logs.length ? logs[logs.length - 1].id : null;

    if (state.meta) {
      todayEl.value = state.meta.today || localDateInputValue();
      document.getElementById("place").value = state.meta.place ?? "大都會公園";
      document.getElementById("distance").value = state.meta.distance ?? "";
      document.getElementById("type").value = state.meta.type || "自由式";
    }
  } catch (err) {
    players = defaultPlayers.map(p => newPlayer(p.num, p.name, p.group));
    logs = [];
    nextLogId = 1;
    latestLogId = null;
    logSortMode = "time";
  }
  players.sort(comparePlayerNumber);
}

function renderPlayers(){
  const tbody = document.getElementById("playersBody");
  tbody.innerHTML = "";

  players.forEach(p => {
    if (!isPlayerGroupVisible(p)) return;

    const elapsed = currentElapsed(p);
    const nameClass = p.finished ? "btn-finished" : (p.running ? "btn-started" : "btn-blue");
    const nameTitle = p.finished ? "已完成" : (p.running ? "計時中" : "尚未開始");
    const canDelete = !isUploading && !p.running && !p.finished && p.laps.length === 0;

    const mainRow = document.createElement("tr");
    mainRow.className = "player-row";
    mainRow.dataset.id = String(p.id);
    mainRow.innerHTML = `
      <td class="col-num"><input type="hidden" class="player-group" value="${escapeHtml(p.group)}"><div class="player-num">${escapeHtml(p.num)}</div></td>
      <td class="col-name"><button class="${nameClass}" data-action="tap" data-id="${p.id}" ${p.finished ? "disabled" : ""}>${escapeHtml(p.name)}</button></td>
      <td class="col-score time-big" id="score_${p.id}">${fmt(elapsed)}</td>
      <td class="col-finish"><button class="btn-red" data-action="finish" data-id="${p.id}" ${(!p.running || p.finished) ? "disabled" : ""}>Finish</button></td>
    `;

    const subRow = document.createElement("tr");
    subRow.className = "sub-row";
    subRow.dataset.id = String(p.id);
    subRow.innerHTML = `
      <td class="col-num">
        <div class="row-tools">
          <div class="drag-handle" data-id="${p.id}" title="拖曳排序">≡</div>
          <button class="btn-del btn-gray" data-action="delete" data-id="${p.id}" ${canDelete ? "" : "disabled"}>Del</button>
        </div>
      </td>
      <td colspan="3">
        <div class="info-box">
          <span>Laps: <span>${p.laps.length}</span></span>
          <span>last:<span>${fmt(lastLapMs(p))}</span></span>
          <span>avg:<span>${fmt(avgLapMs(p))}</span></span>
          <span>${nameTitle}</span>
        </div>
      </td>
    `;

    tbody.appendChild(mainRow);
    tbody.appendChild(subRow);
  });
}

function renderLog(){
  const tb = document.getElementById("log");
  tb.innerHTML = "<tr><th>編號</th><th>姓名</th><th>圈</th><th>單圈</th><th>累計</th><th>紀錄日期時間</th></tr>";

  getDisplayLogs().forEach(r => {
    const tr = document.createElement("tr");
    if (r.id === latestLogId) tr.className = "latest-log";
    const numClass = r.uploaded ? "uploaded-num" : (r.uploadFailed ? "upload-failed-num" : "");
    tr.innerHTML = `
      <td class="${numClass}">${escapeHtml(r.num)}</td>
      <td>${escapeHtml(r.name)}</td>
      <td>${escapeHtml(r.lap)}</td>
      <td>${escapeHtml(r.last)}</td>
      <td>${escapeHtml(r.total)}</td>
      <td>${escapeHtml(r.recordDateTime || "")}</td>
    `;
    tb.appendChild(tr);
  });

  const legendRow = document.createElement("tr");
  legendRow.innerHTML = `
    <td colspan="6" style="text-align:left; padding-left:6px;">
      <span><span class="legend-swatch legend-uploaded"></span>已上傳</span>
      <span style="margin-left:12px;"><span class="legend-swatch legend-failed"></span>上傳失敗</span>
    </td>
  `;
  tb.appendChild(legendRow);

  updateActionButtons();
}

function updateActionButtons(){
  document.getElementById("addPlayerBtn").disabled = isUploading;
  document.getElementById("resetBtn").disabled = isUploading;
  document.getElementById("undoBtn").disabled = isUploading || logs.length === 0;
  document.getElementById("uploadBtn").disabled = isUploading || logs.length === 0;
}

function getDisplayLogs(){
  const rows = [...logs];
  if (logSortMode === "number") {
    rows.sort((a, b) => {
      const na = parseInt(a.num, 10);
      const nb = parseInt(b.num, 10);
      if (na !== nb) return na - nb;
      return Number(a.lap) - Number(b.lap);
    });
  }
  return rows;
}

function renderAll(){
  renderPlayers();
  renderLog();
}

function updateRunningScores(){
  players.forEach(p => {
    if (!p.running) return;
    const el = document.getElementById("score_" + p.id);
    if (el) el.textContent = fmt(currentElapsed(p));
  });
}

function ensureTickTimer(){
  if (tickTimer) clearInterval(tickTimer);
  if (players.some(p => p.running)) {
    tickTimer = setInterval(updateRunningScores, 30);
  } else {
    tickTimer = null;
  }
}

function addLapRecord(p, elapsed, kind){
  const lapCount = p.laps.length + 1;
  const last = lapCount === 1 ? elapsed : elapsed - p.laps[p.laps.length - 1];
  p.laps.push(elapsed);

  const record = {
    id: nextLogId++,
    playerId: p.id,
    num: p.num,
    name: p.name,
    lap: lapCount,
    last: fmt(last),
    total: fmt(elapsed),
    kind,
    recordDateTime: localDateTimeValue(),
    uploaded: false,
    uploadFailed: false,
    uploadError: ""
  };
  logs.push(record);
  latestLogId = record.id;
}

function addStartRecord(p){
  const record = {
    id: nextLogId++,
    playerId: p.id,
    num: p.num,
    name: p.name,
    lap: 0,
    last: ZERO_TIME,
    total: ZERO_TIME,
    kind: "start",
    recordDateTime: localDateTimeValue(),
    uploaded: false,
    uploadFailed: false,
    uploadError: ""
  };
  logs.push(record);
  latestLogId = record.id;
}

function tapPlayer(id){
  if (navigator.vibrate) navigator.vibrate(50);

  const p = getPlayer(id);
  if (!p || p.finished) return;

  if (!p.running) {
    p.start = Date.now() - (p.elapsed || 0);
    p.running = true;
    addStartRecord(p);
    setStatus(`${p.num} ${p.name} 開始計時`);
    renderAll();
    ensureTickTimer();
    saveState();
    return;
  }

  const elapsed = currentElapsed(p);
  p.elapsed = elapsed;
  addLapRecord(p, elapsed, "lap");
  setStatus(`${p.num} ${p.name} 已記錄第 ${p.laps.length} 圈`);
  renderAll();
  saveState();
}

function finishPlayer(id){
  const p = getPlayer(id);
  if (!p || !p.running || p.finished) return;

  const elapsed = currentElapsed(p);
  p.elapsed = elapsed;
  p.running = false;
  p.finished = true;
  p.start = null;
  addLapRecord(p, elapsed, "finish");
  setStatus(`${p.num} ${p.name} 已完成`);
  renderAll();
  ensureTickTimer();
  saveState();
}

function undoLast(){
  if (isUploading) {
    setStatus("上傳中，暫時不能 Undo");
    return;
  }
  const targetIndex = logs.findIndex(r => r.id === latestLogId);
  const lastLog = targetIndex >= 0 ? logs.splice(targetIndex, 1)[0] : logs.pop();
  if (!lastLog) return;

  const p = getPlayer(lastLog.playerId);
  if (p) {
    if (lastLog.kind === "start") {
      p.running = false;
      p.finished = false;
      p.start = null;
      p.elapsed = 0;
    } else if (p.laps.length > 0) {
      p.laps.pop();
      p.finished = false;
      if (lastLog.kind === "finish") {
        p.running = true;
        p.elapsed = p.laps.length ? p.laps[p.laps.length - 1] : 0;
        p.start = Date.now() - p.elapsed;
      } else if (p.running) {
        p.elapsed = currentElapsed(p);
      } else {
        p.elapsed = p.laps.length ? p.laps[p.laps.length - 1] : 0;
        p.start = null;
      }
    }
  }

  latestLogId = logs.length ? logs[logs.length - 1].id : null;
  setStatus(`已撤銷 ${lastLog.num} ${lastLog.name} 第 ${lastLog.lap} 圈`);
  renderAll();
  ensureTickTimer();
  saveState();
}

function addPlayer(){
  if (isUploading) {
    setStatus("上傳中，暫時不能新增選手");
    return;
  }
  const num = prompt("請輸入選手編號：");
  if (!num || !num.trim()) return;
  const cleanNum = num.trim();
  if (players.some(p => p.num === cleanNum)) {
    setStatus(`編號 ${cleanNum} 已存在，未新增選手`);
    return;
  }

  const name = prompt("請輸入選手姓名：");
  if (!name || !name.trim()) return;
  const groupInput = prompt("請輸入選手組別：U10、U12、U14、U16、OPEN");
  if (groupInput === null) return;
  const playerGroup = groupInput.trim().toUpperCase();
  if (!PLAYER_GROUPS.includes(playerGroup)) {
    setStatus("組別必須是 U10、U12、U14、U16 或 OPEN");
    return;
  }

  players.push(newPlayer(cleanNum, name, playerGroup));
  setStatus(`已新增 ${cleanNum} ${name.trim()}`);
  renderAll();
  saveState();
}

function resetRace(){
  if (isUploading) {
    setStatus("上傳中，暫時不能重置");
    return;
  }
  if (!confirm("確定 重置畫面嗎？ 歷程記錄將會清空，所有選手會回到尚未開始狀態。")) return;

  players.forEach(p => {
    p.start = null;
    p.elapsed = 0;
    p.laps = [];
    p.running = false;
    p.finished = false;
  });
  logs = [];
  latestLogId = null;
  logSortMode = "time";
  players.sort(comparePlayerNumber);
  document.getElementById("today").value = localDateInputValue();
  setStatus("已重置完成，所有選手回到尚未開始狀態");
  renderAll();
  ensureTickTimer();
  saveState();
}

function deletePlayer(id){
  if (isUploading) {
    setStatus("上傳中，暫時不能刪除選手");
    return;
  }
  const p = getPlayer(id);
  if (!p) return;
  if (p.running || p.finished || p.laps.length > 0) {
    alert("此選手已開始或已有記錄，不能刪除。");
    return;
  }
  if (!confirm(`確定刪除 ${p.num} ${p.name}？`)) return;

  players = players.filter(item => item.id !== id);
  logs = logs.filter(r => r.playerId !== id);
  setStatus(`已刪除 ${p.num} ${p.name}`);
  renderAll();
  saveState();
}

function sortLog(){
  logSortMode = "number";
  setStatus("歷程記錄已依編號、圈數排序");
  renderLog();
  saveState();
}

async function uploadResults(){
  if (isUploading) return;
  if (!logs.length) {
    setStatus("目前沒有記錄可上傳");
    return;
  }

  const pending = logs.filter(r => !r.uploaded);
  if (!pending.length) {
    setStatus("所有記錄都已上傳");
    return;
  }

  const uploadBtn = document.getElementById("uploadBtn");
  isUploading = true;
  uploadBtn.disabled = true;
  setStatus(`上傳中：0 / ${pending.length}`);
  renderAll();

  let success = 0;
  let failed = 0;
  for (const r of pending) {
    try {
      const uploadDateTime = localDateTimeValue();
      const recordDateTime = r.recordDateTime || uploadDateTime;
      const formData = new FormData();
      formData.append("sheet", "laps");
      formData.append("num", r.num);
      formData.append("name", r.name);
      formData.append("lap", r.lap);
      formData.append("last", r.last);
      formData.append("total", r.total);
      formData.append("recordDateTime", recordDateTime);
      formData.append("uploadDateTime", uploadDateTime);

      formData.append("編號", r.num);
      formData.append("姓名", r.name);
      formData.append("圈", r.lap);
      formData.append("單圈", r.last);
      formData.append("累計", r.total);
      formData.append("紀錄日期時間", recordDateTime);
      formData.append("上傳日期時間", uploadDateTime);

      const response = await fetch(GAS_URL, { method:"POST", body:formData });
      const resultText = await response.text();
      if (!response.ok) throw new Error("HTTP " + response.status);
      if (resultText.includes("❌") || resultText.includes("錯誤")) {
        throw new Error(resultText);
      }

      r.uploaded = true;
      r.uploadFailed = false;
      r.uploadError = "";
      r.recordDateTime = recordDateTime;
      r.uploadDateTime = uploadDateTime;
      success++;
      setStatus(`上傳中：${success} / ${pending.length}`);
      renderLog();
      saveState();
    } catch (err) {
      r.uploaded = false;
      r.uploadFailed = true;
      r.uploadError = err.message || String(err);
      failed++;
      setStatus(`上傳中：成功 ${success} 筆，失敗 ${failed} 筆`);
      renderLog();
      saveState();
    }
  }

  isUploading = false;
  setStatus(`上傳完成：成功 ${success} 筆，失敗 ${failed} 筆`);
  renderAll();
  saveState();
}

function copyControlValues(original, clone){
  const origInputs = original.querySelectorAll("input, select");
  const cloneInputs = clone.querySelectorAll("input, select");
  for (let i = 0; i < origInputs.length; i++) {
    cloneInputs[i].value = origInputs[i].value;
    if (origInputs[i].disabled) cloneInputs[i].disabled = true;
  }
}

function assertHtml2Canvas(){
  if (typeof window.html2canvas !== "function") {
    alert("截圖功能無法使用：html2canvas 尚未載入。請確認網路可連到 CDN 後再試一次。");
    return false;
  }
  return true;
}

function openCanvas(canvas){
  const w = window.open("");
  if (!w) {
    alert("瀏覽器封鎖了新視窗，請允許彈出視窗後再截圖。");
    return;
  }
  w.document.write(`<img src="${canvas.toDataURL()}" style="max-width:100%;">`);
}

function captureLog(){
  if (!assertHtml2Canvas()) return;

  const headerRow = document.querySelector("#raceHeader");
  const logTable = document.getElementById("log");
  if (!headerRow || !logTable) return;

  const wrapper = document.createElement("div");
  wrapper.style.position = "fixed";
  wrapper.style.left = "-10000px";
  wrapper.style.top = "0";
  wrapper.style.padding = "10px";
  wrapper.style.backgroundColor = "#ffffff";
  wrapper.style.boxSizing = "border-box";
  wrapper.innerHTML = `
    <div id="logHeaderClone">${headerRow.outerHTML}</div>
    ${logTable.outerHTML}
  `;

  document.body.appendChild(wrapper);
  copyControlValues(headerRow, wrapper.querySelector("#logHeaderClone"));

  html2canvas(wrapper, { scale:2, backgroundColor:"#ffffff" })
    .then(canvas => openCanvas(canvas))
    .catch(err => alert("記錄截圖失敗：" + err.message))
    .finally(() => document.body.removeChild(wrapper));
}

function captureScores(){
  if (!assertHtml2Canvas()) return;

  const original = document.getElementById("scoreArea");
  const wrapper = document.createElement("div");
  wrapper.style.position = "fixed";
  wrapper.style.left = "-10000px";
  wrapper.style.top = "0";
  wrapper.style.padding = "10px 10px 10px 30px";
  wrapper.style.backgroundColor = "#ffffff";
  wrapper.style.boxSizing = "border-box";
  wrapper.innerHTML = original.outerHTML;

  document.body.appendChild(wrapper);
  const clonedScoreArea = wrapper.querySelector("#scoreArea");
  copyControlValues(original, clonedScoreArea);

  clonedScoreArea.querySelectorAll(".row-tools").forEach(el => {
    el.style.visibility = "hidden";
  });
  clonedScoreArea.querySelectorAll(".player-num").forEach(el => {
    el.style.display = "flex";
    el.style.alignItems = "center";
    el.style.justifyContent = "center";
    el.style.paddingTop = "10px";
    el.style.paddingBottom = "16px";
    el.style.lineHeight = "1.3";
  });

  html2canvas(clonedScoreArea, {
    scale:2,
    backgroundColor:"#ffffff",
    scrollX:0,
    scrollY:0
  })
    .then(canvas => openCanvas(canvas))
    .catch(err => alert("成績截圖失敗：" + err.message))
    .finally(() => document.body.removeChild(wrapper));
}

function setupDrag(){
  const table = document.getElementById("players");

  table.addEventListener("pointerdown", e => {
    const handle = e.target.closest(".drag-handle");
    if (!handle) return;

    draggingId = Number(handle.dataset.id);
    const mainRow = table.querySelector(`tr.player-row[data-id="${draggingId}"]`);
    if (mainRow) mainRow.classList.add("dragging");

    document.addEventListener("pointermove", onPointerMove);
    document.addEventListener("pointerup", onPointerUp);
    e.preventDefault();
  });

  function onPointerMove(e){
    if (!draggingId) return;

    const tableRect = table.getBoundingClientRect();
    const y = e.clientY - tableRect.top;
    const rows = [...table.querySelectorAll("tr.player-row")].filter(row => Number(row.dataset.id) !== draggingId);

    let targetId = null;
    for (const row of rows) {
      const rect = row.getBoundingClientRect();
      const middle = rect.top - tableRect.top + rect.height / 2;
      if (y < middle) {
        targetId = Number(row.dataset.id);
        break;
      }
    }

    const fromIndex = players.findIndex(p => p.id === draggingId);
    if (fromIndex < 0) return;

    const moved = players.splice(fromIndex, 1)[0];
    let toIndex = targetId ? players.findIndex(p => p.id === targetId) : players.length;
    if (toIndex < 0) toIndex = players.length;
    players.splice(toIndex, 0, moved);

    renderPlayers();
    const mainRow = table.querySelector(`tr.player-row[data-id="${draggingId}"]`);
    if (mainRow) mainRow.classList.add("dragging");
  }

  function onPointerUp(){
    if (!draggingId) return;
    draggingId = null;
    document.removeEventListener("pointermove", onPointerMove);
    document.removeEventListener("pointerup", onPointerUp);
    renderPlayers();
    saveState();
  }
}

document.getElementById("players").addEventListener("click", e => {
  const btn = e.target.closest("button[data-action]");
  if (!btn) return;

  const id = Number(btn.dataset.id);
  if (btn.dataset.action === "tap") tapPlayer(id);
  if (btn.dataset.action === "finish") finishPlayer(id);
  if (btn.dataset.action === "delete") deletePlayer(id);
});

document.getElementById("addPlayerBtn").addEventListener("click", addPlayer);
document.getElementById("resetBtn").addEventListener("click", resetRace);
document.getElementById("undoBtn").addEventListener("click", undoLast);
document.getElementById("uploadBtn").addEventListener("click", uploadResults);
document.getElementById("sortLogBtn").addEventListener("click", sortLog);
document.getElementById("captureLogBtn").addEventListener("click", captureLog);
document.getElementById("captureScores").addEventListener("click", captureScores);

document.querySelectorAll("#raceHeader input, #raceHeader select").forEach(el => {
  el.addEventListener("input", saveState);
  el.addEventListener("change", saveState);
});

document.querySelectorAll(".player-group-filter").forEach(el => {
  el.addEventListener("change", updatePlayerGroupVisibility);
});

window.addEventListener("beforeunload", function (e) {
  if (!players.some(p => p.running)) return;
  const message = "仍有選手正在計時，確定要離開嗎？";
  e.preventDefault();
  e.returnValue = message;
  return message;
});

loadState();
saveState();
renderAll();
setupDrag();
ensureTickTimer();
</script>
